<!DOCTYPE html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANIME VERSE</title>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background-color:#000;
      color:#fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .navbar{
      background:#000;
    }

    .navbar-brand{
      color:#ff6a00 !important;
      font-weight:bold;
      font-size:24px;
    }

    .nav-link{
      color:#fff !important;
      margin-right:15px;
    }
    .banner{
  height:70vh;
  background: url("C:/New folder/solid.jpg") center center / cover no-repeat;
  position:relative;
  display:flex;
  align-items:center;
  padding-left:50px;
}

.banner::after{
  content:"";
  position:absolute;
  top:0;left:0;
  width:100%;height:90%;
  background:rgba(0,0,0,0.5);
}

.banner-content{
  position:relative;
  z-index:2;
}


    .banner h1{
      font-size:48px;
      font-weight:bold;
    }

    .btn-orange{
      background:#ff6a00;
      border:none;
      padding:10px 25px;
      font-weight:bold;
    }

    .anime-card img{
      border-radius:10px;
      transition:0.3s;
    }

    .anime-card img:hover{
      transform:scale(1.08);
    }

    .section-title{
      margin:30px 0 15px;
      font-weight:bold;
      font-size:24px;
    }

    footer{
      background:#111;
      text-align:center;
      padding:20px;
      margin-top:40px;
      color:#aaa;
    }
  </style>
</head>
